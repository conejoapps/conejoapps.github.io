<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>CONEJO</title>
    
    <!-- FAVICON: Conejo Saltando -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐇</text></svg>">
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg: #f0ece6;
            --fg: #1a1a2e;
            --muted: #8a8698;
            --accent: #7c3aed;
            --accent-light: #a78bfa;
            --glass-bg: rgba(255, 255, 255, 0.5);
            --glass-border: rgba(255, 255, 255, 0.75);
            --glass-shine: rgba(255, 255, 255, 0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--fg);
            height: 100vh;
            overflow: hidden;
        }

        /* ===== FONDO ===== */
        .bg-scene {
            position: fixed; inset: 0; z-index: 0; overflow: hidden;
            background: linear-gradient(160deg, #f5f1eb 0%, #ede7f0 40%, #e8e0f0 70%, #f0ece6 100%);
        }
        .blob { position: absolute; border-radius: 50%; filter: blur(90px); opacity: 0.45; will-change: transform; }
        .blob-1 { width: 550px; height: 550px; background: radial-gradient(circle, rgba(124,58,237,0.35), transparent 70%); top: -15%; left: -8%; animation: f1 20s ease-in-out infinite; }
        .blob-2 { width: 500px; height: 500px; background: radial-gradient(circle, rgba(192,132,252,0.3), transparent 70%); bottom: -20%; right: -8%; animation: f2 24s ease-in-out infinite; }
        .blob-3 { width: 400px; height: 400px; background: radial-gradient(circle, rgba(167,139,250,0.25), transparent 70%); top: 40%; left: 55%; animation: f3 22s ease-in-out infinite; }
        .blob-4 { width: 350px; height: 350px; background: radial-gradient(circle, rgba(236,72,153,0.12), transparent 70%); top: 15%; right: 25%; animation: f4 26s ease-in-out infinite; }
        .blob-5 { width: 300px; height: 300px; background: radial-gradient(circle, rgba(124,58,237,0.18), transparent 70%); bottom: 10%; left: 20%; animation: f1 18s ease-in-out infinite reverse; }

        @keyframes f1 { 0%,100%{transform:translate(0,0) scale(1)} 25%{transform:translate(70px,50px) scale(1.08)} 50%{transform:translate(30px,100px) scale(.95)} 75%{transform:translate(-20px,40px) scale(1.04)} }
        @keyframes f2 { 0%,100%{transform:translate(0,0) scale(1)} 30%{transform:translate(-60px,-70px) scale(1.12)} 60%{transform:translate(-30px,-30px) scale(.92)} }
        @keyframes f3 { 0%,100%{transform:translate(0,0) scale(1)} 33%{transform:translate(-80px,40px) scale(1.08)} 66%{transform:translate(40px,-50px) scale(.96)} }
        @keyframes f4 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-60px,70px)} }

        .bg-grid {
            position: fixed; inset: 0; z-index: 1; pointer-events: none;
            background-image: linear-gradient(rgba(124,58,237,0.025) 1px, transparent 1px), linear-gradient(90deg, rgba(124,58,237,0.025) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        /* ===== LIQUID GLASS ===== */
        .liquid-glass {
            background: var(--glass-bg);
            backdrop-filter: blur(50px) saturate(1.6);
            -webkit-backdrop-filter: blur(50px) saturate(1.6);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            position: relative; overflow: hidden;
            box-shadow: 0 8px 32px rgba(0,0,0,0.04), 0 2px 8px rgba(124,58,237,0.04), inset 0 1px 0 rgba(255,255,255,0.6);
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .liquid-glass::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 55%;
            background: linear-gradient(180deg, var(--glass-shine) 0%, transparent 100%);
            border-radius: 28px 28px 0 0; pointer-events: none; opacity: 0.4;
            transition: transform 0.6s ease, opacity 0.6s ease;
        }
        .liquid-glass::after {
            content: ''; position: absolute; top: -1px; left: 15%; right: 15%; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.9), transparent);
            pointer-events: none;
        }

        /* ===== TARJETA APP ===== */
        .app-card {
            cursor: pointer; width: 360px; padding: 44px 40px;
            display: flex; flex-direction: column; align-items: center;
            text-align: center; gap: 22px;
        }
        .app-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: rgba(124,58,237,0.15);
            box-shadow: 0 25px 60px rgba(124,58,237,0.08), 0 8px 24px rgba(0,0,0,0.04), inset 0 1px 0 rgba(255,255,255,0.8);
        }
        .app-card:hover::before { transform: translateX(15px); opacity: 0.6; }
        .app-card:hover .app-icon-wrap { transform: scale(1.1) rotate(-2deg); box-shadow: 0 12px 40px var(--icon-glow); }
        .app-card:active { transform: translateY(-3px) scale(0.98); transition-duration: 0.1s; }

        .app-icon-wrap {
            width: 92px; height: 92px; border-radius: 24px;
            display: flex; align-items: center; justify-content: center;
            font-size: 38px; color: #fff;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative; z-index: 2;
        }
        .app-icon-wrap.rubricas { background: linear-gradient(135deg, #c4b5fd, #8b5cf6); --icon-glow: rgba(139,92,246,0.35); box-shadow: 0 8px 28px rgba(139,92,246,0.25); }
        .app-icon-wrap.automail { background: linear-gradient(135deg, #c4b5fd, #8b5cf6); --icon-glow: rgba(139,92,246,0.35); box-shadow: 0 8px 28px rgba(139,92,246,0.25); }

        .app-title { font-weight: 700; font-size: 1.5rem; letter-spacing: -0.02em; color: var(--fg); position: relative; z-index: 2; }
        .app-desc { font-weight: 300; font-size: 0.92rem; color: var(--muted); line-height: 1.65; position: relative; z-index: 2; max-width: 270px; }
        .app-arrow {
            position: relative; z-index: 2; width: 42px; height: 42px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            background: rgba(124,58,237,0.06); border: 1px solid rgba(124,58,237,0.1);
            color: var(--accent); font-size: 13px; transition: all 0.4s ease;
        }
        .app-card:hover .app-arrow { background: var(--accent); color: #fff; border-color: var(--accent); transform: translateX(4px); box-shadow: 0 6px 20px rgba(124,58,237,0.3); }

        /* ===== VISTA PRINCIPAL ===== */
        #homeView {
            position: fixed; inset: 0; z-index: 10;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: all 0.55s cubic-bezier(0.23, 1, 0.32, 1);
        }
        #homeView.hidden-view { opacity: 0; transform: scale(0.94); pointer-events: none; }

        .logo-area { text-align: center; margin-bottom: 56px; animation: fadeUp 0.9s cubic-bezier(0.23, 1, 0.32, 1) both; }

        .mascot-wrapper { margin: 0 auto 20px; width: 130px; height: 130px; position: relative; display: flex; align-items: flex-end; justify-content: center; }
        .mascot-rabbit { width: 100%; height: auto; filter: drop-shadow(0 10px 15px rgba(124,58,237,0.25)); transform-origin: center bottom; animation: realisticJump 2.2s cubic-bezier(0.25, 0.46, 0.45, 0.94) infinite; }
        .mascot-shadow { position: absolute; bottom: 0; width: 70px; height: 12px; background: rgba(124,58,237,0.15); border-radius: 50%; filter: blur(5px); animation: realisticShadow 2.2s cubic-bezier(0.25, 0.46, 0.45, 0.94) infinite; }

        @keyframes realisticJump { 0%, 100% { transform: translateY(0) scale(1, 1); } 10% { transform: translateY(2px) scale(1.02, 0.95); } 40% { transform: translateY(-22px) scale(0.98, 1.04); } 60% { transform: translateY(-22px) scale(0.98, 1.04); } 85% { transform: translateY(0) scale(1.02, 0.95); } }
        @keyframes realisticShadow { 0%, 100% { transform: scale(1); opacity: 0.5; } 10% { transform: scale(1.1); opacity: 0.6; } 40% { transform: scale(0.5); opacity: 0.2; } 60% { transform: scale(0.5); opacity: 0.2; } 85% { transform: scale(1.1); opacity: 0.6; } }

        .logo-text { font-family: 'Outfit', sans-serif; font-weight: 900; font-size: 3.6rem; letter-spacing: 0.15em; text-transform: uppercase; line-height: 1; color: var(--fg); }
        .logo-sub { font-weight: 300; font-size: 0.95rem; color: var(--muted); margin-top: 12px; letter-spacing: 0.04em; }
        .cards-row { display: flex; gap: 36px; animation: fadeUp 0.9s 0.15s cubic-bezier(0.23, 1, 0.32, 1) both; }

        /* ===== CONTADOR Y TEXTO LEGAL ===== */
        .visit-counter {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 15; /* SOLUCIÓN: Subido de 5 a 15 para estar por encima de #homeView (10) */
            text-align: center;
            color: var(--muted);
            opacity: 0.6;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            pointer-events: none;
            transition: opacity 0.4s ease;
            max-width: 85%;
        }
        #homeView.hidden-view ~ .visit-counter { opacity: 0; }
        
        .counter-text { 
            font-size: 0.85rem; 
        }
        #counter-number { 
            font-weight: 700; 
            font-size: 0.85rem; 
            color: var(--accent); 
        }
        
        .counter-legal {
            font-size: 0.65rem;
            opacity: 0.8;
            line-height: 1.4;
        }
        .hidden-link { 
            color: var(--muted); 
            text-decoration: none; 
            pointer-events: auto; 
            cursor: pointer; 
            transition: color 0.2s ease; 
            position: relative; 
            z-index: 10;      
        }
        .hidden-link:hover { 
            color: var(--accent); 
        }

        /* ===== FULLSCREEN APP VIEW ===== */
        #appView { position: fixed; inset: 0; z-index: 20; display: none; opacity: 0; transition: opacity 0.45s ease; }
        #appView.active-view { opacity: 1; }
        #appFrame { width: 100%; height: 100%; border: none; display: block; background: #fff; }

        /* ===== BOTÓN CERRAR ===== */
        .close-fab {
            position: fixed; bottom: max(8px, env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%); z-index: 40;
            width: 72px; height: 48px; border: none; cursor: pointer; background: transparent; border-radius: 24px;
            display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; outline: none;
            -webkit-tap-highlight-color: transparent;
            transition: width 0.35s cubic-bezier(0.23,1,0.32,1), height 0.35s cubic-bezier(0.23,1,0.32,1), bottom 0.35s cubic-bezier(0.23,1,0.32,1), background 0.35s ease, border 0.35s ease, box-shadow 0.35s ease, opacity 0.4s ease, visibility 0.4s ease;
            visibility: hidden;
        }
        .close-fab.visible { opacity: 1; pointer-events: all; visibility: visible; }
        .close-fab::before { content: ''; position: absolute; width: 48px; height: 5px; border-radius: 3px; background: rgba(30, 20, 50, 0.2); box-shadow: 0 1px 6px rgba(0,0,0,0.06); transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1); pointer-events: none; }

        @media (hover: hover) {
            .close-fab:hover { width: auto; height: 40px; padding: 0 22px; bottom: 20px; border-radius: 50px; background: rgba(30, 20, 50, 0.6); backdrop-filter: blur(24px) saturate(1.3); -webkit-backdrop-filter: blur(24px) saturate(1.3); border: 1px solid rgba(255,255,255,0.15); box-shadow: 0 4px 24px rgba(0,0,0,0.25); cursor: pointer; }
            .close-fab:hover::before { width: 0; height: 0; opacity: 0; background: transparent; box-shadow: none; }
            .close-fab:hover .fab-content { opacity: 1; transform: translateY(0); pointer-events: all; }
        }

        .fab-content { display: flex; align-items: center; gap: 8px; color: #fff; font-family: 'Outfit', sans-serif; font-weight: 600; font-size: 0.76rem; letter-spacing: 0.08em; text-transform: uppercase; white-space: nowrap; opacity: 0; transform: translateY(4px); transition: all 0.25s ease 0.06s; pointer-events: none; }

        /* ===== LOADING ===== */
        .loading-overlay { position: fixed; inset: 0; z-index: 25; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px; background: var(--bg); opacity: 0; pointer-events: none; transition: opacity 0.35s ease; }
        .loading-overlay.active { opacity: 1; pointer-events: all; }
        .loader-ring { width: 38px; height: 38px; border: 2px solid rgba(124,58,237,0.12); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loader-text { font-weight: 400; font-size: 0.82rem; color: var(--muted); letter-spacing: 0.02em; }

        /* ===== PARTÍCULAS ===== */
        .particles { position: fixed; inset: 0; z-index: 2; pointer-events: none; overflow: hidden; }
        .particle { position: absolute; border-radius: 50%; background: rgba(124,58,237,0.15); animation: drift linear infinite; }
        @keyframes drift { 0%{transform:translateY(100vh) translateX(0);opacity:0} 10%{opacity:1} 90%{opacity:1} 100%{transform:translateY(-10vh) translateX(20px);opacity:0} }
        @keyframes fadeUp { from{opacity:0;transform:translateY(28px)} to{opacity:1;transform:translateY(0)} }

        /* ===== MÓVIL ===== */
        @media (max-width: 820px) {
            #homeView { justify-content: center; }
            .logo-area { margin-bottom: 40px; }
            .mascot-wrapper { width: 100px; height: 100px; margin-bottom: 14px; }
            .mascot-rabbit { width: 100%; }
            .mascot-shadow { width: 55px; height: 8px; }
            .logo-text { font-size: 2.4rem; letter-spacing: 0.12em; }
            .logo-sub { font-size: 0.85rem; margin-top: 8px; }
            .cards-row { flex-direction: row; gap: 16px; width: 90%; justify-content: center; }
            .app-card { flex: 0 0 45%; max-width: 180px; width: auto; padding: 24px 12px 20px; gap: 12px; border-radius: 24px; }
            .app-icon-wrap { width: 56px; height: 56px; font-size: 24px; border-radius: 16px; }
            .app-title { font-size: 1rem; }
            .app-desc { font-size: 0.72rem; line-height: 1.3; color: var(--muted); opacity: 0.8; max-width: 100%; }
            .app-arrow { display: none; }
        }
        @media (max-width: 380px) {
            .mascot-wrapper { width: 85px; height: 85px; }
            .mascot-rabbit { width: 100%; }
            .logo-text { font-size: 2rem; }
            .cards-row { gap: 12px; width: 95%; }
            .app-card { padding: 20px 10px 16px; gap: 10px; }
            .app-icon-wrap { width: 50px; height: 50px; font-size: 22px; border-radius: 14px; }
            .app-title { font-size: 0.92rem; }
            .app-desc { font-size: 0.68rem; }
        }
        @media (prefers-reduced-motion: reduce) {
            .blob,.particle { animation: none !important; }
            .mascot-rabbit, .mascot-shadow { animation: none !important; }
            * { transition-duration: 0.01ms !important; animation-duration: 0.01ms !important; }
        }
    </style>
</head>

    <div class="bg-grid" aria-hidden="true"></div>
    <div class="particles" id="particles" aria-hidden="true"></div>

    <main id="homeView">
        <div class="logo-area">
            <div class="mascot-wrapper">
                <svg class="mascot-rabbit" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">

                </svg>
                <div class="mascot-shadow"></div>
            </div>
            <h1 class="logo-text">CONEJO</h1>
            <p class="logo-sub">Agiliza tu labor docente</p>
        </div>
        
        <nav class="cards-row" aria-label="Aplicaciones disponibles">
            <div class="liquid-glass app-card" role="button" tabindex="0" aria-label="Abrir Rubricat" onclick="openApp('rubricat.html','Rubricat')">
                <div class="app-icon-wrap rubricas"><i class="fa-solid fa-table-list"></i></div>
                <h2 class="app-title">Rubricat</h2>
                <p class="app-desc">Evaluación flexible y rápida</p>
                <div class="app-arrow"><i class="fa-solid fa-arrow-right"></i></div>
            </div>
            <div class="liquid-glass app-card" role="button" tabindex="0" aria-label="Abrir Automail" onclick="openApp('automail.html','Automail')">
                <div class="app-icon-wrap automail"><i class="fa-solid fa-envelope-open-text"></i></div>
                <h2 class="app-title">Automail</h2>
                <p class="app-desc">Correos automáticos personalizados</p>
                <div class="app-arrow"><i class="fa-solid fa-arrow-right"></i></div>
            </div>
        </nav>
    </main>

    <!-- Info legal y Contador -->
    <div class="visit-counter">
        <div class="counter-text">Ya han pasado por aquí <span id="counter-number">...</span> conejos.</div>
        <div class="counter-legal">Conejo no almacena datos de usuario y es totalmente libre. Descárgalo desde <a href="https://github.com/conejoapps/conejoapps.github.io" target="_blank" class="hidden-link">github</a> para usarlo de forma local.</div>
    </div>

    <div id="appView"><iframe id="appFrame" title="Aplicación embebida"></iframe></div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="loader-ring"></div>
        <span class="loader-text" id="loadingText">Cargando...</span>
    </div>

    <button class="close-fab" id="closeFab" aria-label="Volver a CONEJO">
        <div class="fab-content">
            <i class="fa-solid fa-arrow-left" style="font-size:11px;"></i>
            <span>CONEJO</span>
        </div>
    </button>

    <script>
        /* Partículas */
        (function(){
            var c = document.getElementById('particles');
            for(var i = 0; i < 24; i++){
                var p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + '%';
                var s = Math.random() * 3 + 1.5;
                p.style.width = p.style.height = s + 'px';
                p.style.animationDuration = (Math.random() * 22 + 18) + 's';
                p.style.animationDelay = (Math.random() * 22) + 's';
                p.style.opacity = Math.random() * 0.35 + 0.05;
                c.appendChild(p);
            }
        })();

        var currentApp = null;
        var homeView = document.getElementById('homeView');
        var appView = document.getElementById('appView');
        var appFrame = document.getElementById('appFrame');
        var closeFab = document.getElementById('closeFab');
        var loadingOverlay = document.getElementById('loadingOverlay');
        var loadingText = document.getElementById('loadingText');
        var isTouchDevice = !window.matchMedia('(hover: hover)').matches;

        function openApp(url, name) {
            currentApp = { url: url, name: name };
            homeView.classList.add('hidden-view');
            loadingText.textContent = 'Cargando ' + name + '...';
            loadingOverlay.classList.add('active');
            appView.style.display = 'block';
            var appLoaded = false; 
            
            appFrame.onload = function() {
                if(appLoaded) return; 
                var isError = false;
                try { if(appFrame.contentWindow.location.href === "about:blank") isError = true; } catch(e) {}
                if (isError) {
                    loadingText.textContent = "Error: No se encontró el archivo";
                    setTimeout(function() { loadingOverlay.classList.remove('active'); homeView.classList.remove('hidden-view'); appView.style.display = 'none'; }, 2000);
                    appLoaded = true; return;
                }
                appLoaded = true;
                setTimeout(function() { loadingOverlay.classList.remove('active'); void appView.offsetWidth; appView.classList.add('active-view'); setTimeout(function() { closeFab.classList.add('visible'); }, 250); }, 200);
            };
            appFrame.src = url;
            setTimeout(function() {
                if (!appLoaded) { appLoaded = true; loadingOverlay.classList.remove('active'); if(!appView.classList.contains('active-view')) { void appView.offsetWidth; appView.classList.add('active-view'); setTimeout(function() { closeFab.classList.add('visible'); }, 250); } }
            }, 4000);
        }

        function closeApp() {
            closeFab.classList.remove('visible');
            closeFab.classList.remove('expanded-mobile'); 
            appView.classList.remove('active-view');
            setTimeout(function() { appView.style.display = 'none'; appFrame.src = 'about:blank'; currentApp = null; homeView.classList.remove('hidden-view'); }, 460);
        }

        closeFab.addEventListener('click', function(e) {
            e.stopPropagation();
            if (isTouchDevice) { if (closeFab.classList.contains('expanded-mobile')) { closeApp(); } else { closeFab.classList.add('expanded-mobile'); } } else { closeApp(); }
        });

        document.addEventListener('touchstart', function(e) { if (isTouchDevice && closeFab.classList.contains('expanded-mobile') && !closeFab.contains(e.target)) { closeFab.classList.remove('expanded-mobile'); } }, { passive: true });
        document.addEventListener('keydown', function(e) { if (e.key === 'Escape' && currentApp) { closeApp(); } });

        document.querySelectorAll('.app-card').forEach(function(card) {
            card.addEventListener('keydown', function(e) { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); card.click(); } });
            if (isTouchDevice) return; 
            card.addEventListener('mousemove', function(e) {
                var r = card.getBoundingClientRect();
                var rx = ((e.clientY - r.top - r.height / 2) / (r.height / 2)) * -3.5;
                var ry = ((e.clientX - r.left - r.width / 2) / (r.width / 2)) * 3.5;
                card.style.transform = 'translateY(-10px) scale(1.02) perspective(800px) rotateX(' + rx + 'deg) rotateY(' + ry + 'deg)';
            });
            card.addEventListener('mouseleave', function() { card.style.transform = ''; });
        });

        (function() {
            var style = document.createElement('style');
            style.textContent = '.close-fab.expanded-mobile{width:auto!important;height:40px!important;padding:0 22px!important;bottom:20px!important;border-radius:50px!important;background:rgba(30,20,50,0.6)!important;backdrop-filter:blur(24px) saturate(1.3)!important;-webkit-backdrop-filter:blur(24px) saturate(1.3)!important;border:1px solid rgba(255,255,255,0.15)!important;box-shadow:0 4px 24px rgba(0,0,0,0.25)!important}.close-fab.expanded-mobile::before{width:0!important;height:0!important;opacity:0!important;background:transparent!important;box-shadow:none!important}.close-fab.expanded-mobile .fab-content{opacity:1!important;transform:translateY(0)!important;pointer-events:all!important}';
            document.head.appendChild(style);
        })();

        /* ===== CONTADOR DE VISITAS (Versión final) ===== */
        var counterUrl = 'https://api.counterapi.dev/v1/conejo-docentes-2024/visitas';
        var counterController = new AbortController();
        
        var counterTimeout = setTimeout(function() { counterController.abort(); }, 3000);

        fetch(counterUrl + '/up', { signal: counterController.signal })
            .then(function(res) { 
                clearTimeout(counterTimeout);
                if (!res.ok) throw new Error('Error de API');
                return res.json();
            })
            .then(function(data) { 
                var count = data.count;
                if (sessionStorage.getItem('conejo-visitado') !== null) {
                    count = Math.max(0, count - 1); 
                } else {
                    sessionStorage.setItem('conejo-visitado', 'true');
                }
                document.getElementById('counter-number').innerText = count;
            })
            .catch(function() { 
                document.getElementById('counter-number').innerText = "algunos"; 
            });
    </script>
</body>
</html>
