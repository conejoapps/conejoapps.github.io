function saveNewAlumno() {
  const empresa = document.getElementById('nf-empresa').value.trim();
  if (!empresa) { showToast('⚠️ Indica el nombre de la empresa'); return; }

  // Read nivelId FIRST — needed by the extras loop below
  const nivelSel = document.getElementById('nf-nivel');
  const nivelId = nivelSel ? nivelSel.value : '';
  if (!nivelId) { showToast('⚠️ Selecciona el nivel educativo del alumno'); return; }
  const nivelCat = getEstudioById((getNivelById(nivelId) || {}).estudioId);

  const alumnos_extra = [];
  for (let n = 1; n <= nfExtraCount; n++) {
    const nombre = (document.getElementById('nf-ex-n-'+n)||{}).value || '';
    const correo = (document.getElementById('nf-ex-c-'+n)||{}).value || '';
    const exNivelSel = document.getElementById('nf-ex-nivel-'+n);
    const exNivelId = exNivelSel && exNivelSel.value ? exNivelSel.value : nivelId;
    const exNivelCat = exNivelId ? getEstudioById((getNivelById(exNivelId)||{}).estudioId) : null;

    if (nombre || correo) alumnos_extra.push({
      nombre: nombre.trim(),
      correo: correo.trim(),
      estudio: exNivelCat ? exNivelCat.nombre : '',
      nivelId: exNivelId,

    });
  }
  const data = {
    empresa,
    tutor:    document.getElementById('nf-tutor').value.trim(),
    coemp:    document.getElementById('nf-coemp').value.trim(),
    nombre:   document.getElementById('nf-nombre').value.trim(),
    correo:   document.getElementById('nf-correo').value.trim(),
    estudio:  nivelCat ? nivelCat.nombre : '',
    nivelId,
    hora1:    parseInt(document.getElementById('nf-hora1').value) || 9,
    hora2:    parseInt(document.getElementById('nf-hora2').value) || 14,

    alumnos_extra
  };
  if (editingAlumnoIdx >= 0) {
    state.alumnos[editingAlumnoIdx] = data;
    showToast('Empresa actualizada ✓');
  } else {
    state.alumnos.push(data);
    showToast('Empresa añadida ✓');
    document.getElementById('nav-dot-alumnos').classList.add('show');
    setTimeout(() => document.getElementById('nav-dot-alumnos').classList.remove('show'), 3000);
  }
  save(); closeInlineForm(); renderAlumnos();
  updateTopbarSub();
  renderCfgSummary();
}

function removeAlumno(i) {
  if (!confirm('¿Eliminar "' + (state.alumnos[i].empresa || 'esta empresa') + '" y todos sus datos?')) return;
  // If this card is being edited, close the form cleanly first
  if (editingAlumnoIdx === i) {
    const form = document.getElementById('inline-empresa-form');
    const alPage = document.getElementById('page-alumnos');
    const list = document.getElementById('alumnos-list');
    if (form && list && list.contains(form)) alPage.insertBefore(form, list);
    if (form) form.style.display = 'none';
    editingAlumnoIdx = -1;
  }
  state.alumnos.splice(i, 1);
  save(); renderAlumnos(); updateTopbarSub(); renderCfgSummary();
  showToast('Empresa eliminada');
}

  const nombresStr = todosNombres.length > 1
    ? todosNombres.slice(0,-1).join(', ') + ' y ' + todosNombres[todosNombres.length-1]
    : (todosNombres[0] || '[ALUMNOS]');

  state.plantillasAlu.forEach((pl, i) => {
    const isDefault = i < 3; // DEF_ALU has 3
    // Insert single category header before first default item — with alumnos list above it
    if (i === 0) {
      // Alumnos list line
      const todosNombresDisp = state.alumnos
        .flatMap(al => getTodosAlumnos(al).map(a => a.nombre).filter(Boolean));
      const nombresDisp = todosNombresDisp.join(' · ');
      const total = todosNombresDisp.length;
      const aluLine = document.createElement('div');
      aluLine.style.cssText = 'background:rgba(56,189,248,0.15);border:1px solid rgba(56,189,248,0.4);border-radius:100px;padding:7px 14px;margin-bottom:6px;font-size:12px;color:#075985;line-height:1.5;display:flex;align-items:center;gap:8px';
      aluLine.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#0369a1" stroke-width="2" style="flex-shrink:0"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>${nombresDisp
        ? `<span>${esc(nombresDisp)} <span style="font-weight:600;color:#0369a1">(${total})</span></span>`
        : '<em style="color:rgba(56,189,248,0.4)">Sin alumnos registrados</em>'}`;
      etabs.appendChild(aluLine);

      const sep = document.createElement('div');
      sep.style.cssText = 'display:flex;align-items:center;gap:7px;margin:0 0 3px';
      sep.innerHTML = `
        <span style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#0369a1;background:rgba(56,189,248,0.15);padding:2px 8px;border-radius:100px;border:1px solid rgba(56,189,248,0.4)">Seguimiento del docente</span>
        <span style="flex:1;height:1px;background:rgba(56,189,248,0.4);opacity:.4"></span>`;
      etabs.appendChild(sep);
    }
    // Custom templates get their own category header
    if (!isDefault && i === 3) {
      const sep2 = document.createElement('div');
      sep2.style.cssText = 'display:flex;align-items:center;gap:7px;margin:6px 0 3px';
      sep2.innerHTML = `
        <span style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#0369a1;background:rgba(56,189,248,0.15);padding:2px 8px;border-radius:100px;border:1px solid rgba(56,189,248,0.4)">Plantillas personalizadas por el alumno</span>
        <span style="flex:1;height:1px;background:rgba(56,189,248,0.4);opacity:.4"></span>`;
      etabs.appendChild(sep2);
    }

    const nombre = i < EMAIL_ALU_NAMES.length ? EMAIL_ALU_NAMES[i] : (pl.nombre || `Correo ${i+1}`);
    const hint = i < ALU_HINTS.length ? ALU_HINTS[i] : '';
    const isActive = i === activeEmailAlu;
    const borderCol = 'rgba(56,189,248,0.4)'; // always blue for all alu steps
    const numBgCol  = '#38bdf8'; // always blue number for all alu steps

    // Build multi-nivel aware context for generic tags
    // Gather distinct niveles from all alumnos
    const nivelesEnUso = [...new Set(
      state.alumnos.flatMap(al => getTodosAlumnos(al).map(a => a.nivelId || al.nivelId).filter(Boolean))
    )].map(id => getNivelById(id)).filter(Boolean);

    // For generic correo: use first alumno as empresa/tutor ctx, but build combined FECHA/HORA/COMPUTO
    const alumnoCtx = state.alumnos[0] || {};
    let fechaGenerico, horaGenerico, computoGenerico;
    if (nivelesEnUso.length === 1) {
      fechaGenerico   = getFechas(nivelesEnUso[0]);
      computoGenerico = getComputo(nivelesEnUso[0]);
    } else if (nivelesEnUso.length > 1) {
      const cats = nivelesEnUso.map(n => getEstudioById(n.estudioId)).filter(Boolean);
      fechaGenerico   = nivelesEnUso.map(n => {
        const cat = getEstudioById(n.estudioId);
        return `${cat ? cat.nombre : '?'}: ${getFechas(n)}`;
      }).join(' / ');
      computoGenerico = [...new Set(cats.map(c => `${c.horas}h (${c.jornadas}j × ${c.hDiarias}h)`))].join(', ');
    } else {
      fechaGenerico   = '[FECHAS POR DEFINIR]';
      computoGenerico = '[CÓMPUTO POR DEFINIR]';
    }
    // Horario: list distinct horarios from all empresas
    const todasHoras = state.alumnos.map(al => {
      const h1 = al.hora1 || 9;
      const h2 = al.hora2 || 14;
      return `${String(h1).padStart(2,'0')}:00 - ${String(h2).padStart(2,'0')}:00`;
    });
    horaGenerico = [...new Set(todasHoras)].join(' / ') || '09:00 - 14:00';

    const asuntoI = applyTagsGenerico(pl.asunto, nombresStr, alumnoCtx)
      .replace(/\{\{FECHA\}\}/g, fechaGenerico)
      .replace(/\{\{HORA\}\}/g, horaGenerico)
      .replace(/\{\{COMPUTO_PRACTICAS\}\}/g, computoGenerico);
    const cuerpoI = applyTagsGenerico(pl.cuerpo, nombresStr, alumnoCtx)
      .replace(/\{\{FECHA\}\}/g, fechaGenerico)
      .replace(/\{\{HORA\}\}/g, horaGenerico)
      .replace(/\{\{COMPUTO_PRACTICAS\}\}/g, computoGenerico);
    const notaI   = i < EMAIL_ALU_NOTAS.length ? EMAIL_ALU_NOTAS[i] : '';
    const kCorreosI = _cb(correoStr);
    const kAsuntoI  = _cb(asuntoI);
    const kCuerpoI  = _cb(cuerpoI);

    const step = document.createElement('div');
    const isCustomAlu = !isDefault;
    step.className = 'email-step alu' + (isActive ? ' active' : '');
    step.style.borderColor = isActive ? '' : borderCol;
    if (isCustomAlu && !isActive) {
      step.style.borderWidth = '1.5px';
      // No background tint — keep white like default steps
    }
    const copyIcon = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>`;
    step.innerHTML = `
      <button class="email-step-header" onclick="activeEmailAlu=(activeEmailAlu===${i}?-1:${i});renderCorreosAlumnos()">
        <span class="email-step-num" style="${!isActive ? `background:${numBgCol};color:#fff` : ''}">${i+1}</span>
        <span class="email-step-text">
          <span class="email-step-name">${esc(nombre)}</span>
          ${hint ? `<span class="email-step-hint">${hint}</span>` : ''}
        </span>
        <svg class="email-step-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
      <div class="email-step-body">
        <div class="email-card-body">
          <div class="email-field-row">
            <span class="email-field-label">Para</span>
            <span class="email-field-value" style="${!correoStr ? 'color:var(--text-4);font-style:italic' : 'font-size:12px'}">${esc(correoStr || 'Sin correos definidos')}</span>
            ${correoStr ? `<button class="btn btn-sm btn-copy-alu" title="Copiar" onclick="copyBuf('${kCorreosI}','Correos copiados ✓')" style="flex-shrink:0">${copyIcon}</button>` : ''}
          </div>
          <div class="email-field-row">
            <span class="email-field-label">Asunto</span>
            <span class="email-field-value subject" style="white-space:normal">${highlightMissing(asuntoI)}</span>
            <button class="btn btn-sm btn-copy-alu" title="Copiar" onclick="copyBuf('${kAsuntoI}','Asunto copiado ✓')" style="flex-shrink:0">${copyIcon}</button>
          </div>
          <div class="email-body-section">
            <div class="email-body-label">
              <span>Cuerpo</span>
              <button class="btn btn-sm btn-copy-alu" title="Copiar" onclick="copyBuf('${kCuerpoI}','Cuerpo copiado ✓')">${copyIcon}</button>
            </div>
            <div class="email-preview">${highlightMissing(cuerpoI)}</div>
          </div>
          ${notaI ? `<div class="note" style="margin-top:.5rem"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0;margin-top:1px"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg> ${esc(notaI)}</div>` : ''}
        </div>
        <div class="email-send-row">
          <button class="btn-send" style="margin-top:0;flex:1;background:linear-gradient(135deg,#38bdf8 0%,#0284c7 100%);box-shadow:0 4px 16px rgba(56,189,248,.4)" onclick="openSendModal('${esc(correoStr).replace(/'/g,'&#39;')}','${esc(asuntoI).replace(/'/g,'&#39;')}','${kCuerpoI}','Correo a alumnos','Todos los alumnos')">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:6px"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            Enviar a todos los alumnos
          </button>
        </div>
      </div>
    `;
    etabs.appendChild(step);
  });
  c.appendChild(etabs);
}

// ────────────────────────────────────────────────
//  SEND EMAIL
// ────────────────────────────────────────────────
let _sendData = {};

function openSendModal(para, asunto, kCuerpo, title, sub) {
  const cuerpo = _buf[kCuerpo] || '';
  const enc = s => encodeURIComponent(s || '').replace(/!/g,'%21').replace(/'/g,'%27').replace(/\(/g,'%28').replace(/\)/g,'%29').replace(/\*/g,'%2A');

  // Detect mobile (Android / iOS)
  const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

  if (isMobile) {
    // Native mail app via mailto:
    let qs = `subject=${enc(asunto)}&body=${enc(cuerpo)}`;
    if (state.cfg.remitente) qs += `&from=${enc(state.cfg.remitente)}`;
    const link = document.createElement('a');
    link.href = `mailto:${para}?${qs}`;
    link.style.display = 'none';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    showToast('✉️ Abriendo app de correo...');
  } else {
    // Desktop (Windows / Mac) → open Gmail compose in browser
    const gmailUrl = `https://mail.google.com/mail/?view=cm&fs=1` +
      `&to=${enc(para)}` +
      `&su=${enc(asunto)}` +
      `&body=${enc(cuerpo)}` +
      (state.cfg.remitente ? `&from=${enc(state.cfg.remitente)}` : '');
    window.open(gmailUrl, '_blank');
    showToast('✉️ Abriendo Gmail...');
  }
}

function closeSendModal() {
  document.getElementById('modal-send').classList.remove('open');
}
function closeSendModalIfBg(e) {
  if (e.target === document.getElementById('modal-send')) closeSendModal();
}

function doSendEmail() {
  const { para, asunto, cuerpo } = _sendData;
  if (!para) { showToast('⚠️ No hay correo destinatario'); return; }

  const enc = s => encodeURIComponent(s || '').replace(/!/g,'%21').replace(/'/g,'%27').replace(/\(/g,'%28').replace(/\)/g,'%29').replace(/\*/g,'%2A');
  const isDesktop = /Windows|Macintosh/.test(navigator.userAgent) && !/Android|iPhone|iPad/.test(navigator.userAgent);

  if (isDesktop) {
    // Open Gmail web compose on desktop
    const gmailUrl = `https://mail.google.com/mail/?view=cm&to=${enc(para)}&su=${enc(asunto)}&body=${enc(cuerpo)}`;
    window.open(gmailUrl, '_blank');
  } else {
    // Mobile: open native mail app via mailto
    let qs = `subject=${enc(asunto)}&body=${enc(cuerpo)}`;
    if (state.cfg.remitente) qs += `&from=${enc(state.cfg.remitente)}`;
    const link = document.createElement('a');
    link.href = `mailto:${para}?${qs}`;
    link.style.display = 'none';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  }

  closeSendModal();
  showToast('✉️ Abriendo app de correo...');
}

// ────────────────────────────────────────────────
//  EXPORT / IMPORT
// ────────────────────────────────────────────────
function exportData() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'automail_backup.json';
  a.click();
  showToast('Copia exportada ✓');
}
function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const r = new FileReader();
  r.onload = ev => {
    try {
      const p = JSON.parse(ev.target.result);
      if (p.cfg)           state.cfg           = Object.assign({}, state.cfg, p.cfg);
      if (p.niveles)       state.niveles        = p.niveles;
      if (p.plantillasEmp) state.plantillasEmp  = p.plantillasEmp;
      if (p.plantillasAlu) state.plantillasAlu  = p.plantillasAlu;
      if (p.alumnos)       state.alumnos        = p.alumnos;
      // Reset edit state to avoid stale references
      editingAlumnoIdx = -1;
      _editingNivelIdx = -1;
      _pendingNivel    = null;
      save();
      loadCfg();
      renderNivelesList();
      renderAlumnos();
      renderCfgSummary();
      showPage('general');
      showToast('Datos importados ✓');
    } catch { showToast('Error al importar el archivo'); }
  };
  r.readAsText(file);
  e.target.value = '';
}

// ────────────────────────────────────────────────
//  INIT
// ────────────────────────────────────────────────
buildHourSelects();
load();
loadCfg();
updateTopbarSub();
showPage('general');
showInnerTab('config');
</script>
